  <!-- 阿里郎表演者 -->
  <g transform="translate(60,100)">
    <ellipse fill="#FFE4C4" cx="0" cy="0" rx="8" ry="10"/>
    <path fill="#DC143C" d="M-10,10 L10,10 L15,60 L-15,60 Z"/>
  </g>
  <g transform="translate(100,105)">
    <ellipse fill="#FFE4C4" cx="0" cy="0" rx="8" ry="10"/>
    <path fill="#4169E1" d="M-10,10 L10,10 L15,60 L-15,60 Z"/>
  </g>
  <g transform="translate(140,100)">
    <ellipse fill="#FFE4C4" cx="0" cy="0" rx="8" ry="10"/>
    <path fill="#DC143C" d="M-10,10 L10,10 L15,60 L-15,60 Z"/>
  </g>
  <g transform="translate(180,105)">
    <ellipse fill="#FFE4C4" cx="0" cy="0" rx="8" ry="10"/>
