  <circle fill="#4ECDC4" opacity="0.5" cx="220" cy="60" r="15"/>
  <!-- 标题 -->
  <rect fill="rgba(220,20,60,0.85)" x="10" y="175" width="70" height="22" rx="4"/>
  <text x="45" y="190" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif">阿里郎</text>
