<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#87CEEB" width="280" height="200"/>
  <!-- 山脉 -->
  <polygon fill="#228B22" points="0,200 60,100 120,160 180,80 240,140 280,110 280,200"/>
  <!-- 主体思想塔 -->
  <rect fill="#C0C0C0" x="125" y="40" width="30" height="140"/>
  <rect fill="#A9A9A9" x="120" y="35" width="40" height="10"/>
  <!-- 火焰顶端 -->
  <ellipse fill="#FF4500" cx="140" cy="25" rx="15" ry="20"/>
  <ellipse fill="#FFD700" cx="140" cy="22" rx="10" ry="14"/>
  <ellipse fill="#FFF" cx="140" cy="20" rx="5" ry="8"/>
  <!-- 底座 -->
  <rect fill="#808080" x="100" y="175" width="80" height="25"/>
  <!-- 飘带 -->
  <path fill="#DC143C" d="M50,150 Q80,140 110,150 Q80,160 50,150"/>
  <path fill="#DC143C" d="M170,150 Q200,140 230,150 Q200,160 170,150"/>
  <!-- 标题 -->
  <rect fill="rgba(220,20,60,0.85)" x="10" y="10" width="90" height="25" rx="4"/>
  <text x="55" y="27" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">主体思想塔</text>
</svg>