<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C"/>
      <stop offset="100%" style="stop-color:#FF4500"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 灯笼 -->
  <ellipse cx="50" cy="50" rx="18" ry="22" fill="#FF4500"/>
  <ellipse cx="50" cy="50" rx="14" ry="18" fill="#FFD700"/>
  <ellipse cx="90" cy="50" rx="18" ry="22" fill="#FF4500"/>
  <ellipse cx="90" cy="50" rx="14" ry="18" fill="#FFD700"/>
  <!-- 灯笼顶底 -->
  <rect x="42" y="26" width="16" height="4" fill="#DAA520"/>
  <rect x="82" y="26" width="16" height="4" fill="#DAA520"/>
  <rect x="42" y="72" width="16" height="4" fill="#DAA520"/>
  <rect x="82" y="72" width="16" height="4" fill="#DAA520"/>
  <!-- 穗子 -->
  <line x1="50" y1="76" x2="50" y2="85" stroke="#FFD700" stroke-width="2"/>
  <line x1="90" y1="76" x2="90" y2="85" stroke="#FFD700" stroke-width="2"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="white" font-size="10">春节</text>
</svg>