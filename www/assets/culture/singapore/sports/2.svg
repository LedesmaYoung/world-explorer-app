<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#FFA500"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 游泳池 -->
  <rect x="20" y="40" width="100" height="50" fill="#00CED1" rx="5"/>
  <!-- 泳道线 -->
  <line x1="20" y1="55" x2="120" y2="55" stroke="#FFF" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="20" y1="70" x2="120" y2="70" stroke="#FFF" stroke-width="1" stroke-dasharray="5,3"/>
  <!-- 游泳者 -->
  <ellipse cx="50" cy="62" rx="8" ry="5" fill="#F5DEB3"/>
  <circle cx="58" cy="60" r="5" fill="#F5DEB3"/>
  <ellipse cx="90" cy="62" rx="8" ry="5" fill="#F5DEB3"/>
  <circle cx="98" cy="60" r="5" fill="#F5DEB3"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="white" font-size="10">游泳</text>
</svg>