<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#228B22"/>
      <stop offset="100%" style="stop-color:#32CD32"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 羽毛球拍 -->
  <ellipse cx="50" cy="45" rx="18" ry="25" fill="#1E3A5F"/>
  <ellipse cx="50" cy="45" rx="14" ry="20" fill="#FFF"/>
  <!-- 拍线 -->
  <line x1="50" y1="25" x2="50" y2="65" stroke="#DDD" stroke-width="0.5"/>
  <line x1="36" y1="45" x2="64" y2="45" stroke="#DDD" stroke-width="0.5"/>
  <!-- 拍柄 -->
  <rect x="46" y="68" width="8" height="25" fill="#8B4513"/>
  <!-- 羽毛球 -->
  <ellipse cx="95" cy="55" rx="8" ry="10" fill="#FFF"/>
  <polygon points="95,45 90,30 100,30" fill="#FFF"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="white" font-size="10">羽毛球</text>
</svg>