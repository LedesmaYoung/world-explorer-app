<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C"/>
      <stop offset="100%" style="stop-color:#FF4500"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 辣椒蟹壳 -->
  <ellipse cx="70" cy="60" rx="35" ry="25" fill="#FF6347"/>
  <!-- 蟹钳 -->
  <ellipse cx="35" cy="55" rx="12" ry="8" fill="#FF6347"/>
  <ellipse cx="105" cy="55" rx="12" ry="8" fill="#FF6347"/>
  <!-- 蟹腿 -->
  <line x1="50" y1="70" x2="40" y2="80" stroke="#FF6347" stroke-width="4"/>
  <line x1="60" y1="75" x2="55" y2="85" stroke="#FF6347" stroke-width="4"/>
  <line x1="80" y1="75" x2="85" y2="85" stroke="#FF6347" stroke-width="4"/>
  <line x1="90" y1="70" x2="100" y2="80" stroke="#FF6347" stroke-width="4"/>
  <!-- 辣椒酱 -->
  <ellipse cx="70" cy="55" rx="20" ry="12" fill="#8B0000"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="white" font-size="10">辣椒蟹</text>
