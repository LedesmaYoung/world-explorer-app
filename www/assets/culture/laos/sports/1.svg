  <ellipse fill="#DEB887" cx="110" cy="135" rx="6" ry="8"/>
  <rect fill="#4169E1" x="104" y="143" width="12" height="15"/>
  <ellipse fill="#DEB887" cx="140" cy="133" rx="6" ry="8"/>
  <rect fill="#4169E1" x="134" y="141" width="12" height="15"/>
  <ellipse fill="#DEB887" cx="170" cy="135" rx="6" ry="8"/>
