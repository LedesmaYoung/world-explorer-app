<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#4169E1" opacity="0.3" width="280" height="200"/>
  <!-- 海浪 -->
  <path fill="#87CEEB" opacity="0.5" d="M0,150 Q70,130 140,150 Q210,170 280,150 L280,200 L0,200 Z"/>
  <!-- 冲浪板 -->
  <ellipse fill="#FFD700" cx="140" cy="140" rx="15" ry="40" transform="rotate(-20,140,140)"/>
  <!-- 冲浪者 -->
  <ellipse fill="#DEB887" cx="135" cy="100" rx="8" ry="10"/>
  <path fill="#DC143C" d="M127,110 L143,110 L145,135 L125,135 Z"/>
  <!-- 手臂 -->
  <line x1="125" y1="115" x2="110" y2="100" stroke="#DEB887" stroke-width="5" stroke-linecap="round"/>
  <line x1="145" y1="115" x2="160" y2="100" stroke="#DEB887" stroke-width="5" stroke-linecap="round"/>
  <!-- 腿 -->
  <line x1="130" y1="135" x2="125" y2="145" stroke="#DEB887" stroke-width="5" stroke-linecap="round"/>
  <line x1="140" y1="135" x2="150" y2="145" stroke="#DEB887" stroke-width="5" stroke-linecap="round"/>
  <!-- 水花 -->
  <ellipse fill="#E0FFFF" cx="100" cy="160" rx="20" ry="8"/>
  <ellipse fill="#E0FFFF" cx="180" cy="165" rx="25" ry="10"/>
  <!-- 太阳 -->
  <circle fill="#FFD700" cx="230" cy="40" r="25"/>
  <!-- 标题 -->
  <rect fill="rgba(255,215,0,0.85)" x="10" y="10" width="50" height="25" rx="4"/>
  <text x="35" y="27" text-anchor="middle" fill="#8B4513" font-size="12" font-family="sans-serif">冲浪</text>
</svg>