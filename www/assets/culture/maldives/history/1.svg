<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#87CEEB" width="280" height="200"/>
  <!-- 海洋 -->
  <rect fill="#4169E1" opacity="0.5" y="150" width="280" height="50"/>
  <!-- 海滩 -->
  <ellipse fill="#F5DEB3" cx="140" cy="170" rx="120" ry="30"/>
  <!-- 水上屋 -->
  <rect fill="#8B4513" x="60" y="100" width="50" height="40"/>
  <polygon fill="#A0522D" points="60,100 85,80 110,100"/>
  <rect fill="#8B4513" x="170" y="105" width="50" height="40"/>
  <polygon fill="#A0522D" points="170,105 195,85 220,105"/>
  <!-- 木桩 -->
  <rect fill="#6B4423" x="65" y="140" width="5" height="30"/>
  <rect fill="#6B4423" x="100" y="140" width="5" height="30"/>
  <rect fill="#6B4423" x="175" y="145" width="5" height="30"/>
  <rect fill="#6B4423" x="210" y="145" width="5" height="30"/>
  <!-- 椰子树 -->
  <rect fill="#8B4513" x="20" y="80" width="10" height="80"/>
  <ellipse fill="#228B22" cx="25" cy="75" rx="25" ry="12"/>
  <rect fill="#8B4513" x="250" y="90" width="10" height="70"/>
  <ellipse fill="#228B22" cx="255" cy="85" rx="20" ry="10"/>
  <!-- 太阳 -->
  <circle fill="#FFD700" cx="230" cy="40" r="25"/>
  <!-- 标题 -->
  <rect fill="rgba(65,105,225,0.85)" x="10" y="10" width="90" height="25" rx="4"/>
  <text x="55" y="27" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">水上屋</text>
</svg>