  <!-- 樱花飘落 -->
  <circle fill="#FFB7C5" cx="30" cy="100" r="4"/>
  <circle fill="#FFB7C5" cx="120" cy="120" r="3"/>
  <circle fill="#FFB7C5" cx="180" cy="90" r="4"/>
  <circle fill="#FFB7C5" cx="250" cy="110" r="3"/>
  <!-- 标题 -->
  <rect fill="rgba(220,20,60,0.85)" x="10" y="10" width="70" height="25" rx="4"/>
  <text x="45" y="27" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">鸟居神社</text>
