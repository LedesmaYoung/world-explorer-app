  <!-- 石板路 -->
  <path fill="#A0A0A0" d="M0,180 L280,180 L280,200 L0,200 Z"/>
  <rect fill="#888" x="20" y="182" width="40" height="16" rx="2"/>
  <rect fill="#888" x="80" y="182" width="40" height="16" rx="2"/>
  <rect fill="#888" x="140" y="182" width="40" height="16" rx="2"/>
