<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#87CEEB" width="280" height="200"/>
  <!-- 鸟居 -->
  <rect fill="#DC143C" x="50" y="80" width="15" height="100"/>
  <rect fill="#DC143C" x="100" y="80" width="15" height="100"/>
  <rect fill="#DC143C" x="150" y="70" width="15" height="110"/>
  <rect fill="#DC143C" x="200" y="80" width="15" height="100"/>
  <!-- 顶部横梁 -->
  <rect fill="#DC143C" x="35" y="75" width="45" height="12" rx="2"/>
  <rect fill="#DC143C" x="85" y="75" width="45" height="12" rx="2"/>
  <rect fill="#DC143C" x="135" y="65" width="45" height="12" rx="2"/>
  <rect fill="#DC143C" x="185" y="75" width="45" height="12" rx="2"/>
  <!-- 顶部装饰 -->
  <rect fill="#B22222" x="30" y="68" width="55" height="8" rx="2"/>
  <rect fill="#B22222" x="80" y="68" width="55" height="8" rx="2"/>
  <rect fill="#B22222" x="130" y="58" width="55" height="8" rx="2"/>
