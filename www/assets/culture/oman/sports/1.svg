<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#87CEEB" width="280" height="200"/>
  <!-- 海洋 -->
  <rect fill="#4169E1" opacity="0.5" y="140" width="280" height="60"/>
  <!-- 传统帆船 -->
  <path fill="#8B4513" d="M80,130 Q140,100 200,130 L200,170 L80,170 Z"/>
  <path fill="#A0522D" d="M90,125 Q140,105 190,125 L190,165 L90,165 Z"/>
  <!-- 帆 -->
  <polygon fill="#F5F5DC" points="140,40 100,120 180,120"/>
  <polygon fill="#E8E8D0" points="140,45 105,115 175,115"/>
  <!-- 绳索 -->
  <line x1="140" y1="40" x2="140" y2="130" stroke="#8B4513" stroke-width="2"/>
  <line x1="100" y1="120" x2="140" y2="130" stroke="#8B4513" stroke-width="1"/>
  <line x1="180" y1="120" x2="140" y2="130" stroke="#8B4513" stroke-width="1"/>
  <!-- 太阳 -->
  <circle fill="#FFD700" cx="230" cy="50" r="25"/>
  <!-- 标题 -->
  <rect fill="rgba(65,105,225,0.85)" x="10" y="10" width="90" height="25" rx="4"/>
  <text x="55" y="27" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">传统帆船</text>
</svg>