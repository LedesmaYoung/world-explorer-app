<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#87CEEB" width="280" height="200"/>
  <!-- 草地 -->
  <rect fill="#228B22" y="160" width="280" height="40"/>
  <!-- 奔跑的马 -->
  <ellipse fill="#8B4513" cx="140" cy="120" rx="40" ry="25"/>
  <ellipse fill="#A0522D" cx="140" cy="115" rx="35" ry="20"/>
  <!-- 马腿 -->
  <line x1="110" y1="135" x2="100" y2="165" stroke="#8B4513" stroke-width="6"/>
  <line x1="125" y1="135" x2="115" y2="165" stroke="#8B4513" stroke-width="6"/>
  <line x1="155" y1="135" x2="145" y2="165" stroke="#8B4513" stroke-width="6"/>
  <line x1="170" y1="135" x2="180" y2="165" stroke="#8B4513" stroke-width="6"/>
  <!-- 马头 -->
  <ellipse fill="#8B4513" cx="185" cy="100" rx="20" ry="15"/>
  <ellipse fill="#A0522D" cx="190" cy="95" rx="12" ry="10"/>
  <!-- 马尾 -->
  <path fill="#4A2C00" d="M100,115 Q80,120 70,110 Q75,130 95,125"/>
  <!-- 骑手 -->
  <ellipse fill="#DEB887" cx="145" cy="85" rx="8" ry="10"/>
  <path fill="#DC143C" d="M138,95 L152,95 L155,120 L135,120 Z"/>
  <!-- 尘土 -->
  <ellipse fill="#D2B48C" opacity="0.4" cx="90" cy="170" rx="30" ry="10"/>
  <ellipse fill="#D2B48C" opacity="0.3" cx="60" cy="175" rx="25" ry="8"/>
  <!-- 标题 -->
  <rect fill="rgba(139,69,19,0.85)" x="10" y="10" width="70" height="25" rx="4"/>
  <text x="45" y="27" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">赛马</text>
</svg>