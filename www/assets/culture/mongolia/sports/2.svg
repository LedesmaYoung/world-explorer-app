<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#228B22"/>
      <stop offset="100%" style="stop-color="#006400"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 弓 -->
  <path d="M40 20 Q25 55 40 90" stroke="#8B4513" stroke-width="5" fill="none"/>
  <!-- 弓弦 -->
  <line x1="40" y1="20" x2="40" y2="90" stroke="#FFF" stroke-width="2"/>
  <!-- 箭 -->
  <line x1="40" y1="55" x2="100" y2="55" stroke="#8B4513" stroke-width="3"/>
  <polygon points="100,55 110,50 110,60" fill="#8B4513"/>
  <text x="70" y="105" text-anchor="middle" fill="#FFF" font-size="10">射箭</text>
</svg>