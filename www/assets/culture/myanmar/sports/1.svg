<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#E8F5E9" width="280" height="200"/>
  <!-- 足球场 -->
  <rect fill="#228B22" x="30" y="80" width="220" height="100"/>
  <line x1="140" y1="80" x2="140" y2="180" stroke="white" stroke-width="2"/>
  <circle fill="none" stroke="white" stroke-width="2" cx="140" cy="130" r="25"/>
  <!-- 球门 -->
  <rect fill="white" x="30" y="105" width="5" height="50"/>
  <rect fill="white" x="245" y="105" width="5" height="50"/>
  <!-- 藤球 -->
  <ellipse fill="#FFD700" cx="140" cy="120" rx="8" ry="6"/>
  <!-- 球员 -->
  <ellipse fill="#DEB887" cx="100" cy="115" rx="8" ry="10"/>
  <path fill="#DC143C" d="M92,125 L108,125 L110,165 L90,165 Z"/>
  <!-- 踢球腿 -->
  <line x1="100" y1="155" x2="125" y2="130" stroke="#DEB887" stroke-width="6" stroke-linecap="round"/>
  <ellipse fill="#DEB887" cx="180" cy="120" rx="8" ry="10"/>
  <path fill="#4169E1" d="M172,130 L188,130 L190,170 L170,170 Z"/>
  <!-- 标题 -->
  <rect fill="rgba(34,139,34,0.85)" x="10" y="10" width="50" height="25" rx="4"/>
  <text x="35" y="27" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">足球</text>
</svg>