<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#FFD700"/>
      <stop offset="100%" style="stop-color="#DAA520"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 灯光节 -->
  <circle cx="50" cy="40" r="8" fill="#FF4500"/>
  <circle cx="90" cy="40" r="8" fill="#FF4500"/>
  <circle cx="50" cy="70" r="8" fill="#FF4500"/>
  <circle cx="90" cy="70" r="8" fill="#FF4500"/>
  <!-- 烛光 -->
  <ellipse cx="50" cy="35" rx="3" ry="5" fill="#FFA500"/>
  <ellipse cx="90" cy="35" rx="3" ry="5" fill="#FFA500"/>
  <ellipse cx="50" cy="65" rx="3" ry="5" fill="#FFA500"/>
  <ellipse cx="90" cy="65" rx="3" ry="5" fill="#FFA500"/>
  <!-- 中间大灯 -->
  <circle cx="70" cy="55" r="15" fill="#FFF"/>
  <circle cx="70" cy="55" r="10" fill="#FFD700"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="#8B4513" font-size="10">灯光节</text>
</svg>