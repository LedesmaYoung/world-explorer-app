<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#DAA520"/>
      <stop offset="100%" style="stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 瑞光大金塔 -->
  <ellipse cx="70" cy="80" rx="40" ry="15" fill="#B8860B"/>
  <rect x="40" y="45" width="60" height="35" fill="#FFD700"/>
  <polygon points="40,45 70,25 100,45" fill="#DAA520"/>
  <!-- 塔尖 -->
  <polygon points="70,25 70,10 78,25" fill="#FFD700"/>
  <circle cx="70" cy="8" r="4" fill="#FFD700"/>
  <!-- 钻石顶 -->
  <polygon points="70,4 68,8 72,8" fill="#FF69B4"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="#8B4513" font-size="10">大金塔</text>
</svg>