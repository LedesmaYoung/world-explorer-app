<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5DEB3"/>
      <stop offset="100%" style="stop-color:#DEB887"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 石油井架 -->
  <rect x="50" y="30" width="40" height="50" fill="#696969"/>
  <!-- 井架结构 -->
  <line x1="50" y1="30" x2="70" y2="15" stroke="#505050" stroke-width="3"/>
  <line x1="90" y1="30" x2="70" y2="15" stroke="#505050" stroke-width="3"/>
  <line x1="50" y1="50" x2="90" y2="50" stroke="#505050" stroke-width="2"/>
  <line x1="50" y1="70" x2="90" y2="70" stroke="#505050" stroke-width="2"/>
  <!-- 油滴 -->
  <ellipse cx="70" cy="90" rx="8" ry="5" fill="#000"/>
  <text x="70" y="100" text-anchor="middle" fill="#505050" font-size="10">石油工业</text>
</svg>