  <path fill="#D2B48C" d="M0,150 Q70,130 140,150 Q210,170 280,150 L280,200 L0,200 Z"/>
  <!-- 伊斯兰艺术博物馆 -->
  <rect fill="#F5F5F5" x="80" y="70" width="120" height="90"/>
  <rect fill="#E8E8E8" x="90" y="80" width="100" height="70"/>
  <!-- 窗户 -->
  <rect fill="#4169E1" x="100" y="90" width="20" height="30"/>
  <rect fill="#4169E1" x="130" y="90" width="20" height="30"/>
  <rect fill="#4169E1" x="160" y="90" width="20" height="30"/>
  <!-- 入口 -->
  <path fill="#8B4513" d="M120,160 L120,130 Q140,115 160,130 L160,160 Z"/>
