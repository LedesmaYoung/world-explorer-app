  <rect fill="#4169E1" opacity="0.6" x="60" y="160" width="160" height="15"/>
  <!-- 棕榈树 -->
  <rect fill="#8B4513" x="40" y="100" width="8" height="60"/>
  <ellipse fill="#228B22" cx="44" cy="95" rx="20" ry="10"/>
  <rect fill="#8B4513" x="235" y="105" width="8" height="55"/>
  <ellipse fill="#228B22" cx="239" cy="100" rx="18" ry="9"/>
  <!-- 标题 -->
  <rect fill="rgba(245,245,245,0.9)" x="10" y="10" width="90" height="25" rx="4"/>
  <text x="55" y="27" text-anchor="middle" fill="#4169E1" font-size="12" font-family="sans-serif">伊斯兰艺术馆</text>
</svg>