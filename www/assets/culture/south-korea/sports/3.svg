<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#4169E1"/>
      <stop offset="100%" style="stop-color:#6495ED"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 弓 -->
  <path d="M30 30 Q20 55 30 80" stroke="#8B4513" stroke-width="4" fill="none"/>
  <!-- 弓弦 -->
  <line x1="30" y1="30" x2="30" y2="80" stroke="#FFF" stroke-width="2"/>
  <!-- 箭 -->
  <line x1="30" y1="55" x2="100" y2="55" stroke="#8B4513" stroke-width="3"/>
  <polygon points="100,55 110,50 110,60" fill="#8B4513"/>
  <!-- 靶 -->
  <circle cx="115" cy="55" r="15" fill="#FFF" stroke="#DC143C" stroke-width="2"/>
  <circle cx="115" cy="55" r="10" fill="#DC143C"/>
  <circle cx="115" cy="55" r="5" fill="#FFD700"/>
  <text x="70" y="100" text-anchor="middle" fill="#FFF" font-size="10">射箭</text>
</svg>