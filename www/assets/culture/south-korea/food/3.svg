  <!-- 配料分区 -->
  <path d="M70 60 L70 40" stroke="#228B22" stroke-width="8"/>
  <path d="M70 60 L50 50" stroke="#FF6347" stroke-width="8"/>
  <path d="M70 60 L90 50" stroke="#FFD700" stroke-width="8"/>
  <path d="M70 60 L55 70" stroke="#FF69B4" stroke-width="8"/>
  <path d="M70 60 L85 70" stroke="#98FB98" stroke-width="8"/>
  <!-- 蛋黄 -->
  <circle cx="70" cy="55" r="8" fill="#FFD700"/>
