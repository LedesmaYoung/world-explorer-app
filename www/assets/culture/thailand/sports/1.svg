<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#E8F5E9" width="280" height="200"/>
  <!-- 拳台 -->
  <rect fill="#1a1a1a" x="30" y="100" width="220" height="80" rx="5"/>
  <rect fill="#D2691E" x="40" y="110" width="200" height="60"/>
  <!-- 角柱 -->
  <rect fill="#DC143C" x="35" y="90" width="10" height="90"/>
  <rect fill="#4169E1" x="235" y="90" width="10" height="90"/>
  <!-- 绳子 -->
  <line x1="45" y1="110" x2="235" y2="110" stroke="white" stroke-width="3"/>
  <line x1="45" y1="130" x2="235" y2="130" stroke="white" stroke-width="3"/>
  <line x1="45" y1="150" x2="235" y2="150" stroke="white" stroke-width="3"/>
  <!-- 泰拳手 -->
  <ellipse fill="#DEB887" cx="110" cy="120" rx="10" ry="12"/>
  <path fill="#DC143C" d="M100,132 L120,132 L125,180 L95,180 Z"/>
  <!-- 拳套 -->
  <ellipse fill="#DC143C" cx="95" cy="125" rx="12" ry="10"/>
  <ellipse fill="#DC143C" cx="135" cy="125" rx="12" ry="10"/>
  <ellipse fill="#DEB887" cx="180" cy="125" rx="10" ry="12"/>
  <path fill="#4169E1" d="M170,137 L190,137 L195,180 L165,180 Z"/>
  <ellipse fill="#4169E1" cx="165" cy="130" rx="12" ry="10"/>
  <ellipse fill="#4169E1" cx="205" cy="130" rx="12" ry="10"/>
  <!-- 标题 -->
  <rect fill="rgba(220,20,60,0.85)" x="10" y="10" width="50" height="25" rx="4"/>
  <text x="35" y="27" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">泰拳</text>
</svg>