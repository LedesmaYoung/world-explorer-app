  <circle cx="50" cy="60" r="3" fill="#ADD8E6"/>
  <circle cx="90" cy="45" r="4" fill="#ADD8E6"/>
  <circle cx="110" cy="55" r="3" fill="#ADD8E6"/>
  <circle cx="60" cy="70" r="5" fill="#ADD8E6"/>
  <circle cx="80" cy="75" r="4" fill="#ADD8E6"/>
