  <ellipse cx="100" cy="35" rx="12" ry="8" fill="#87CEEB" opacity="0.8"/>
  <ellipse cx="70" cy="55" rx="20" ry="12" fill="#87CEEB" opacity="0.7"/>
  <!-- 水花 -->
