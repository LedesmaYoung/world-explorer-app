<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#1a1a2e" width="280" height="200"/>
  <!-- 月亮 -->
  <circle fill="#FFD700" opacity="0.9" cx="220" cy="50" r="30"/>
  <!-- 屋顶 -->
  <polygon fill="#8B4513" points="60,130 100,100 140,130"/>
  <rect fill="#A0522D" x="70" y="130" width="60" height="50"/>
  <polygon fill="#8B4513" points="140,130 180,100 220,130"/>
  <rect fill="#A0522D" x="150" y="130" width="60" height="50"/>
  <!-- 灯笼 -->
  <rect fill="#FFD700" x="88" y="90" width="8" height="4"/>
  <ellipse fill="#DC143C" cx="92" cy="115" rx="12" ry="20"/>
  <rect fill="#FFD700" x="86" y="135" width="12" height="3"/>
  <line x1="92" y1="138" x2="92" y2="150" stroke="#FFD700" stroke-width="2"/>
  <rect fill="#FFD700" x="168" y="90" width="8" height="4"/>
  <ellipse fill="#DC143C" cx="172" cy="115" rx="12" ry="20"/>
  <rect fill="#FFD700" x="166" y="135" width="12" height="3"/>
  <line x1="172" y1="138" x2="172" y2="150" stroke="#FFD700" stroke-width="2"/>
  <!-- 灯笼上的福字 -->
  <text x="92" y="120" text-anchor="middle" fill="#FFD700" font-size="14" font-family="serif">福</text>
  <text x="172" y="120" text-anchor="middle" fill="#FFD700" font-size="14" font-family="serif">春</text>
  <!-- 星星 -->
  <circle fill="#FFD700" cx="40" cy="40" r="2"/>
  <circle fill="#FFD700" cx="100" cy="30" r="1.5"/>
  <circle fill="#FFD700" cx="160" cy="45" r="2"/>
  <!-- 标题 -->
  <rect fill="rgba(220,20,60,0.85)" x="10" y="175" width="70" height="22" rx="4"/>
  <text x="45" y="190" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif">中秋节</text>
</svg>