<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#98FB98"/>
      <stop offset="100%" style="stop-color:#90EE90"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 春卷 -->
  <rect x="25" y="40" width="90" height="35" fill="#F5DEB3" rx="3"/>
  <!-- 卷皮纹理 -->
  <line x1="35" y1="40" x2="35" y2="75" stroke="#DEB887" stroke-width="1"/>
  <line x1="55" y1="40" x2="55" y2="75" stroke="#DEB887" stroke-width="1"/>
  <line x1="75" y1="40" x2="75" y2="75" stroke="#DEB887" stroke-width="1"/>
  <line x1="95" y1="40" x2="95" y2="75" stroke="#DEB887" stroke-width="1"/>
  <!-- 馅料 -->
  <rect x="30" y="50" width="15" height="15" fill="#FF6347" opacity="0.6"/>
  <rect x="50" y="48" width="15" height="18" fill="#FFD700" opacity="0.6"/>
  <rect x="70" y="50" width="15" height="15" fill="#90EE90" opacity="0.6"/>
  <rect x="90" y="48" width="15" height="18" fill="#DDA0DD" opacity="0.6"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="#2F4F4F" font-size="10">越南春卷</text>
</svg>