<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#228B22"/>
      <stop offset="100%" style="stop-color:#32CD32"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 羽毛球 -->
  <circle cx="70" cy="50" r="8" fill="#FFF"/>
  <polygon points="70,42 66,30 74,30" fill="#FFF"/>
  <!-- 球拍 -->
  <ellipse cx="45" cy="50" rx="15" ry="20" fill="#1E3A5F" opacity="0.7"/>
  <ellipse cx="45" cy="50" rx="12" ry="16" fill="#FFF" opacity="0.5"/>
  <rect x="42" y="68" width="6" height="18" fill="#8B4513"/>
  <!-- 网格线 -->
  <line x1="45" y1="34" x2="45" y2="66" stroke="#DDD" stroke-width="0.5"/>
  <line x1="33" y1="50" x2="57" y2="50" stroke="#DDD" stroke-width="0.5"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="white" font-size="10">羽毛球</text>
</svg>