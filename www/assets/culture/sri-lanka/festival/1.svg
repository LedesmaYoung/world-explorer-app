  <!-- 油灯 -->
  <ellipse fill="#CD7F32" cx="70" cy="150" rx="15" ry="8"/>
  <ellipse fill="#FFD700" cx="70" cy="145" rx="8" ry="12"/>
  <ellipse fill="#CD7F32" cx="210" cy="150" rx="15" ry="8"/>
