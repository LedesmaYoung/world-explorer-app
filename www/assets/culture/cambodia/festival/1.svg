<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#1a1a2e" width="280" height="200"/>
  <!-- 月亮 -->
  <circle fill="#FFD700" opacity="0.9" cx="220" cy="50" r="30"/>
  <!-- 河流 -->
  <rect fill="#4169E1" opacity="0.5" y="150" width="280" height="50"/>
  <!-- 月亮船 -->
  <path fill="#FFD700" d="M80,130 Q140,110 200,130 Q140,140 80,130"/>
  <!-- 灯笼 -->
  <ellipse fill="#DC143C" cx="120" cy="115" rx="10" ry="15"/>
  <ellipse fill="#FF6B6B" cx="140" cy="110" rx="10" ry="15"/>
  <ellipse fill="#DC143C" cx="160" cy="115" rx="10" ry="15"/>
  <!-- 蜡烛光 -->
  <circle fill="#FFD700" cx="120" cy="100" r="3"/>
  <circle fill="#FFD700" cx="140" cy="95" r="3"/>
  <circle fill="#FFD700" cx="160" cy="100" r="3"/>
  <!-- 倒影 -->
  <ellipse fill="#FFD700" opacity="0.3" cx="140" cy="160" rx="50" ry="10"/>
  <!-- 星星 -->
  <circle fill="#FFD700" cx="40" cy="40" r="2"/>
  <circle fill="#FFD700" cx="100" cy="30" r="1.5"/>
  <circle fill="#FFD700" cx="180" cy="35" r="2"/>
  <!-- 标题 -->
  <rect fill="rgba(65,105,225,0.85)" x="10" y="175" width="90" height="22" rx="4"/>
  <text x="55" y="190" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif">送水节</text>
</svg>