<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C"/>
      <stop offset="100%" style="stop-color="#FF4500"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 柬埔寨国旗 -->
  <rect x="20" y="30" width="100" height="50" fill="#DC143C"/>
  <!-- 白色寺庙 -->
  <polygon points="70,35 55,50 85,50" fill="#FFF"/>
  <rect x="60" y="50" width="20" height="25" fill="#FFF"/>
  <!-- 蓝色条纹 -->
  <rect x="20" y="30" width="100" height="8" fill="#1E3A5F"/>
  <rect x="20" y="72" width="100" height="8" fill="#1E3A5F"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="white" font-size="10">国旗</text>
</svg>