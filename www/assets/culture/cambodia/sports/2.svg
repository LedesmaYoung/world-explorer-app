<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#DC143C"/>
      <stop offset="100%" style="stop-color="#B22222"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 柬埔寨拳击 -->
  <circle cx="70" cy="25" r="10" fill="#F5DEB3"/>
  <rect x="60" y="35" width="20" height="25" fill="#DC143C"/>
  <!-- 手臂 -->
  <rect x="35" y="38" width="25" height="6" fill="#F5DEB3" transform="rotate(-15 47 41)"/>
  <rect x="80" y="38" width="25" height="6" fill="#F5DEB3" transform="rotate(15 93 41)"/>
  <!-- 拳套 -->
  <ellipse cx="35" cy="40" rx="8" ry="6" fill="#8B0000"/>
  <ellipse cx="105" cy="40" rx="8" ry="6" fill="#8B0000"/>
  <!-- 腿 -->
  <rect x="58" y="60" width="8" height="25" fill="#1E3A5F"/>
  <rect x="74" y="60" width="8" height="25" fill="#1E3A5F"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="white" font-size="10">柬拳</text>
</svg>