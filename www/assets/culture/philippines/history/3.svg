<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C"/>
      <stop offset="100%" style="stop-color:#FF4500"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 黎刹纪念碑 -->
  <rect x="50" y="35" width="40" height="55" fill="#808080"/>
  <!-- 纪念碑顶 -->
  <polygon points="50,35 70,20 90,35" fill="#696969"/>
  <!-- 黎刹雕像 -->
  <circle cx="70" cy="50" r="8" fill="#F5DEB3"/>
  <rect x="65" y="58" width="10" height="15" fill="#1E3A5F"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="white" font-size="10">黎刹纪念碑</text>
</svg>