<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#87CEEB" width="280" height="200"/>
  <!-- 沙地 -->
  <rect fill="#D2B48C" y="130" width="280" height="70"/>
  <!-- 越野车 -->
  <rect fill="#4169E1" x="80" y="100" width="120" height="40" rx="10"/>
  <rect fill="#1E90FF" x="90" y="85" width="60" height="30" rx="5"/>
  <!-- 车轮 -->
  <circle fill="#1a1a1a" cx="100" cy="140" r="18"/>
  <circle fill="#4A4A4A" cx="100" cy="140" r="10"/>
  <circle fill="#1a1a1a" cx="180" cy="140" r="18"/>
  <circle fill="#4A4A4A" cx="180" cy="140" r="10"/>
  <!-- 沙尘 -->
  <ellipse fill="#D2B48C" opacity="0.6" cx="60" cy="150" rx="40" ry="15"/>
  <ellipse fill="#D2B48C" opacity="0.4" cx="50" cy="160" rx="30" ry="10"/>
  <!-- 太阳 -->
  <circle fill="#FFD700" cx="230" cy="40" r="25"/>
  <!-- 标题 -->
  <rect fill="rgba(65,105,225,0.85)" x="10" y="10" width="90" height="25" rx="4"/>
  <text x="55" y="27" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">沙漠越野</text>
</svg>