<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF4500"/>
      <stop offset="100%" style="stop-color:#DC143C"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 深海蓝天节(大宝森节) -->
  <!-- 卡瓦迪 -->
  <rect x="60" y="30" width="20" height="50" fill="#FFD700"/>
  <!-- 装饰 -->
  <circle cx="50" cy="25" r="8" fill="#FF4500"/>
  <circle cx="90" cy="25" r="8" fill="#FF4500"/>
  <!-- 孔雀羽毛装饰 -->
  <line x1="50" y1="25" x2="35" y2="15" stroke="#228B22" stroke-width="3"/>
  <line x1="50" y1="25" x2="30" y2="20" stroke="#1E90FF" stroke-width="3"/>
  <line x1="90" y1="25" x2="105" y2="15" stroke="#228B22" stroke-width="3"/>
  <line x1="90" y1="25" x2="110" y2="20" stroke="#1E90FF" stroke-width="3"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="white" font-size="10">大宝森节</text>
</svg>