<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#2E5A8F"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 马六甲红屋 -->
  <rect x="25" y="40" width="90" height="45" fill="#8B0000"/>
  <!-- 荷兰式屋顶 -->
  <polygon points="25,40 70,15 115,40" fill="#4A0E0E"/>
  <!-- 窗户 -->
  <rect x="35" y="50" width="15" height="20" fill="#FFF8DC"/>
  <rect x="60" y="50" width="20" height="20" fill="#FFF8DC"/>
  <rect x="90" y="50" width="15" height="20" fill="#FFF8DC"/>
  <!-- 标签 -->
  <text x="70" y="100" text-anchor="middle" fill="white" font-size="10">马六甲</text>
</svg>