  <rect x="38" y="40" width="3" height="3" fill="#87CEEB"/>
  <rect x="45" y="40" width="3" height="3" fill="#87CEEB"/>
  <rect x="83" y="30" width="3" height="3" fill="#87CEEB"/>
  <rect x="90" y="30" width="3" height="3" fill="#87CEEB"/>
  <rect x="83" y="40" width="3" height="3" fill="#87CEEB"/>
