<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#191970"/>
      <stop offset="100%" style="stop-color:#4169E1"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 月亮 -->
  <circle cx="105" cy="30" r="20" fill="#FFD700"/>
  <!-- 月饼 -->
  <ellipse cx="70" cy="70" rx="30" ry="15" fill="#D2691E"/>
  <ellipse cx="70" cy="65" rx="28" ry="13" fill="#F4A460"/>
  <!-- 月饼花纹 -->
  <circle cx="70" cy="65" r="8" fill="none" stroke="#8B4513" stroke-width="1"/>
  <text x="70" y="68" text-anchor="middle" fill="#8B4513" font-size="10">月</text>
  <!-- 云 -->
  <ellipse cx="35" cy="40" rx="15" ry="8" fill="#FFF" opacity="0.5"/>
  <ellipse cx="45" cy="45" rx="12" ry="6" fill="#FFF" opacity="0.5"/>
</svg>