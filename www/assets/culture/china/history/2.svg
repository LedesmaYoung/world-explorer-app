<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <defs>
    <linearGradient id="wall2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D32F2F"/>
      <stop offset="100%" style="stop-color:#B71C1C"/>
    </linearGradient>
  </defs>
  <!-- 天空 -->
  <rect fill="#87CEEB" width="280" height="200"/>
  <!-- 宫墙 -->
  <rect fill="url(#wall2)" x="0" y="100" width="280" height="100"/>
  <!-- 主殿 -->
  <polygon fill="#FFD700" points="80,100 140,60 200,100"/>
  <rect fill="#8B0000" x="85" y="100" width="110" height="50"/>
  <polygon fill="#DAA520" points="85,100 140,70 195,100"/>
  <!-- 门 -->
  <rect fill="#5D0000" x="125" y="115" width="30" height="35"/>
  <circle fill="#FFD700" cx="130" cy="132" r="3"/>
  <circle fill="#FFD700" cx="150" cy="132" r="3"/>
  <!-- 侧殿 -->
  <polygon fill="#DAA520" points="20,100 50,80 80,100"/>
  <rect fill="#8B0000" x="25" y="100" width="50" height="40"/>
  <polygon fill="#DAA520" points="200,100 230,80 260,100"/>
  <rect fill="#8B0000" x="205" y="100" width="50" height="40"/>
  <!-- 屋顶装饰 -->
  <circle fill="#FFD700" cx="140" cy="60" r="5"/>
  <!-- 白玉栏杆 -->
  <rect fill="#F5F5DC" x="0" y="145" width="280" height="10"/>
  <rect fill="#F5F5DC" x="20" y="145" width="5" height="15"/>
  <rect fill="#F5F5DC" x="50" y="145" width="5" height="15"/>
  <rect fill="#F5F5DC" x="80" y="145" width="5" height="15"/>
  <rect fill="#F5F5DC" x="110" y="145" width="5" height="15"/>
  <rect fill="#F5F5DC" x="140" y="145" width="5" height="15"/>
  <rect fill="#F5F5DC" x="170" y="145" width="5" height="15"/>
  <rect fill="#F5F5DC" x="200" y="145" width="5" height="15"/>
  <rect fill="#F5F5DC" x="230" y="145" width="5" height="15"/>
  <rect fill="#F5F5DC" x="260" y="145" width="5" height="15"/>
  <!-- 标题 -->
  <rect fill="rgba(0,0,0,0.5)" x="10" y="175" width="80" height="25" rx="4"/>
  <text x="50" y="192" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">故宫</text>
</svg>