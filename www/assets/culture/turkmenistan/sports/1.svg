<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#87CEEB" width="280" height="200"/>
  <!-- 草地 -->
  <rect fill="#228B22" y="150" width="280" height="50"/>
  <!-- 赛马 -->
  <ellipse fill="#FFD700" cx="140" cy="105" rx="50" ry="28"/>
  <ellipse fill="#FFECB3" cx="140" cy="100" rx="45" ry="23"/>
  <!-- 马腿 -->
  <line x1="100" y1="125" x2="85" y2="165" stroke="#FFD700" stroke-width="6"/>
  <line x1="115" y1="125" x2="100" y2="165" stroke="#FFD700" stroke-width="6"/>
  <line x1="165" y1="125" x2="160" y2="165" stroke="#FFD700" stroke-width="6"/>
  <line x1="180" y1="125" x2="195" y2="165" stroke="#FFD700" stroke-width="6"/>
  <!-- 马头 -->
  <ellipse fill="#FFD700" cx="195" cy="85" rx="20" ry="18"/>
  <ellipse fill="#FFECB3" cx="200" cy="80" rx="12" ry="10"/>
  <!-- 马尾 -->
  <path fill="#DAA520" d="M90,105 Q70,110 60,100 Q65,120 85,115"/>
  <!-- 骑手 -->
  <ellipse fill="#DEB887" cx="145" cy="70" rx="8" ry="10"/>
  <path fill="#4169E1" d="M137,80 L153,80 L155,110 L135,110 Z"/>
  <!-- 尘土 -->
  <ellipse fill="#D2B48C" opacity="0.4" cx="90" cy="170" rx="25" ry="10"/>
  <!-- 太阳 -->
  <circle fill="#FFD700" cx="230" cy="40" r="25"/>
  <!-- 标题 -->
  <rect fill="rgba(255,215,0,0.85)" x="10" y="10" width="70" height="25" rx="4"/>
  <text x="45" y="27" text-anchor="middle" fill="#8B4513" font-size="12" font-family="sans-serif">赛马</text>
</svg>