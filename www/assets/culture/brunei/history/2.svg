<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color="#DAA520"/>
      <stop offset="100%" style="stop-color="#FFD700"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 清真寺 -->
  <rect x="35" y="50" width="70" height="40" fill="#FFF"/>
