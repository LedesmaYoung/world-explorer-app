  <ellipse cx="70" cy="45" rx="25" ry="20" fill="#FFD700"/>
  <!-- 塔尖 -->
  <polygon points="70,25 70,15 78,25" fill="#FFD700"/>
  <circle cx="70" cy="12" r="3" fill="#FFD700"/>
  <!-- 门 -->
  <rect x="60" y="65" width="20" height="25" fill="#1E3A5F"/>
  <polygon points="60,65 70,55 80,65" fill="#1E3A5F"/>
