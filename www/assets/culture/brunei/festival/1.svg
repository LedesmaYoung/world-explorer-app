<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#1a1a2e" width="280" height="200"/>
  <!-- 月亮 -->
  <circle fill="#FFD700" opacity="0.9" cx="220" cy="50" r="30"/>
  <!-- 清真寺 -->
  <ellipse fill="#FFD700" cx="140" cy="100" rx="50" ry="30"/>
  <path fill="#DAA520" d="M90,100 Q140,50 190,100"/>
  <!-- 穹顶月牙 -->
  <path fill="#FFD700" d="M140,55 L135,45 L145,50 L140,40 L150,50 L140,55"/>
  <!-- 宣礼塔 -->
  <rect fill="#F5F5DC" x="60" y="100" width="20" height="70"/>
  <polygon fill="#FFD700" points="70,100 60,115 80,115"/>
  <rect fill="#F5F5DC" x="200" y="100" width="20" height="70"/>
  <polygon fill="#FFD700" points="210,100 200,115 220,115"/>
  <!-- 灯光 -->
  <circle fill="#FFD700" opacity="0.5" cx="140" cy="130" rx="40" ry="20"/>
  <!-- 星星 -->
  <circle fill="#FFD700" cx="40" cy="40" r="2"/>
  <circle fill="#FFD700" cx="100" cy="30" r="1.5"/>
  <circle fill="#FFD700" cx="180" cy="35" r="2"/>
  <!-- 标题 -->
  <rect fill="rgba(218,165,32,0.85)" x="10" y="175" width="70" height="22" rx="4"/>
  <text x="55" y="190" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif">开斋节</text>
</svg>