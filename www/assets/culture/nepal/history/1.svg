<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#87CEEB" width="280" height="200"/>
  <!-- 雪山 -->
  <polygon fill="#F5F5F5" points="0,200 50,100 100,150 150,60 200,130 250,80 280,110 280,200"/>
  <polygon fill="#E8E8E8" points="100,150 150,60 200,130"/>
  <!-- 寺庙 -->
  <polygon fill="#DC143C" points="140,80 100,120 180,120"/>
  <rect fill="#B22222" x="105" y="120" width="70" height="50"/>
  <!-- 金顶 -->
  <polygon fill="#FFD700" points="140,80 120,90 160,90"/>
  <!-- 门 -->
  <path fill="#8B4513" d="M125,170 L125,135 Q140,120 155,135 L155,170 Z"/>
  <!-- 祈祷旗 -->
  <line x1="60" y1="60" x2="200" y2="60" stroke="#FFD700" stroke-width="2"/>
  <rect fill="#4169E1" x="70" y="60" width="15" height="20"/>
  <rect fill="#FFFFFF" x="90" y="60" width="15" height="20"/>
  <rect fill="#DC143C" x="110" y="60" width="15" height="20"/>
  <rect fill="#228B22" x="130" y="60" width="15" height="20"/>
  <rect fill="#FFD700" x="150" y="60" width="15" height="20"/>
  <!-- 标题 -->
  <rect fill="rgba(220,20,60,0.85)" x="10" y="10" width="90" height="25" rx="4"/>
  <text x="55" y="27" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">喜马拉雅山</text>
</svg>