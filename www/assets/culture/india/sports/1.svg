  <circle fill="#DC143C" cx="165" cy="120" r="6"/>
  <line x1="160" y1="116" x2="170" y2="116" stroke="white" stroke-width="1"/>
  <line x1="160" y1="124" x2="170" y2="124" stroke="white" stroke-width="1"/>
  <!-- 守门员 -->
  <ellipse fill="#DEB887" cx="90" cy="120" rx="6" ry="8"/>
  <path fill="#DC143C" d="M84,128 L96,128 L98,160 L82,160 Z"/>
  <!-- 标题 -->
  <rect fill="rgba(34,139,34,0.85)" x="10" y="10" width="50" height="25" rx="4"/>
  <text x="35" y="27" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">板球</text>
</svg>