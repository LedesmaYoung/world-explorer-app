<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#1a1a2e" width="280" height="200"/>
  <!-- 烟花 -->
  <g transform="translate(70,40)">
    <line x1="0" y1="0" x2="15" y2="-20" stroke="#FF6B6B" stroke-width="2"/>
    <line x1="0" y1="0" x2="-15" y2="-20" stroke="#FF6B6B" stroke-width="2"/>
    <line x1="0" y1="0" x2="20" y2="0" stroke="#4ECDC4" stroke-width="2"/>
    <line x1="0" y1="0" x2="-20" y2="0" stroke="#4ECDC4" stroke-width="2"/>
    <circle fill="#FFD700" cx="15" cy="-20" r="3"/>
    <circle fill="#FF6B6B" cx="-15" cy="-20" r="3"/>
  </g>
  <g transform="translate(210,30)">
    <line x1="0" y1="0" x2="12" y2="-18" stroke="#FF69B4" stroke-width="2"/>
    <line x1="0" y1="0" x2="-12" y2="-18" stroke="#FF69B4" stroke-width="2"/>
    <circle fill="#87CEEB" cx="0" cy="-22" r="3"/>
  </g>
  <!-- 排灯 -->
  <ellipse fill="#DC143C" cx="60" cy="150" rx="15" ry="8"/>
  <ellipse fill="#FF6B6B" cx="60" cy="148" rx="10" ry="5"/>
  <ellipse fill="#FFD700" cx="60" cy="140" rx="5" ry="8"/>
  <ellipse fill="#FF6347" cx="140" cy="160" rx="18" ry="10"/>
  <ellipse fill="#FF8C69" cx="140" cy="158" rx="12" ry="6"/>
  <ellipse fill="#FFD700" cx="140" cy="148" rx="6" ry="10"/>
  <ellipse fill="#4169E1" cx="220" cy="150" rx="15" ry="8"/>
  <ellipse fill="#6495ED" cx="220" cy="148" rx="10" ry="5"/>
  <ellipse fill="#FFD700" cx="220" cy="140" rx="5" ry="8"/>
  <!-- 地面灯串 -->
  <circle fill="#FFD700" cx="30" cy="180" r="4"/>
  <circle fill="#FF6B6B" cx="60" cy="180" r="4"/>
  <circle fill="#4ECDC4" cx="90" cy="180" r="4"/>
  <circle fill="#FF69B4" cx="120" cy="180" r="4"/>
  <circle fill="#FFD700" cx="150" cy="180" r="4"/>
  <circle fill="#FF6B6B" cx="180" cy="180" r="4"/>
  <circle fill="#4ECDC4" cx="210" cy="180" r="4"/>
  <circle fill="#FF69B4" cx="240" cy="180" r="4"/>
  <!-- 星星 -->
  <circle fill="#FFD700" cx="40" cy="60" r="2"/>
  <circle fill="#FFD700" cx="160" cy="50" r="1.5"/>
  <circle fill="#FFD700" cx="250" cy="70" r="2"/>
  <!-- 标题 -->
  <rect fill="rgba(255,107,0,0.85)" x="10" y="175" width="70" height="22" rx="4"/>
  <text x="55" y="190" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif">排灯节</text>
</svg>