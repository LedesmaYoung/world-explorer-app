<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE4C4"/>
      <stop offset="100%" style="stop-color:#F5DEB3"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 土耳其软糖盒 -->
  <rect x="25" y="40" width="90" height="35" fill="#D2691E" rx="5"/>
  <rect x="30" y="45" width="80" height="25" fill="#FFD700"/>
  <!-- 软糖块 -->
  <rect x="35" y="50" width="15" height="10" fill="#FF6347" rx="2"/>
  <rect x="55" y="50" width="15" height="10" fill="#32CD32" rx="2"/>
  <rect x="75" y="50" width="15" height="10" fill="#FF69B4" rx="2"/>
  <rect x="95" y="50" width="10" height="10" fill="#FFD700" rx="2"/>
  <!-- 装饰 -->
  <line x1="30" y1="40" x2="70" y2="30" stroke="#FFD700" stroke-width="1"/>
  <line x1="110" y1="40" x2="70" y2="30" stroke="#FFD700" stroke-width="1"/>
  <text x="70" y="100" text-anchor="middle" fill="#8B4513" font-size="10">土耳其软糖</text>
</svg>