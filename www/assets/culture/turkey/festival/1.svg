<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#1a1a2e" width="280" height="200"/>
  <!-- 月亮 -->
  <circle fill="#FFD700" opacity="0.9" cx="220" cy="50" r="30"/>
  <!-- 蓝色清真寺 -->
  <ellipse fill="#4169E1" cx="140" cy="100" rx="50" ry="30"/>
  <path fill="#1E90FF" d="M90,100 Q140,50 190,100"/>
  <!-- 尖塔 -->
  <path fill="#FFD700" d="M140,55 L136,45 L144,50 L140,40 L148,50 L140,55"/>
  <!-- 宣礼塔 -->
  <rect fill="#4169E1" x="45" y="60" width="12" height="110"/>
  <ellipse fill="#4169E1" cx="51" cy="55" rx="8" ry="10"/>
  <rect fill="#4169E1" x="223" y="60" width="12" height="110"/>
  <ellipse fill="#4169E1" cx="229" cy="55" rx="8" ry="10"/>
  <!-- 灯光 -->
  <ellipse fill="#FFD700" opacity="0.5" cx="140" cy="130" rx="40" ry="20"/>
  <!-- 星星 -->
  <circle fill="#FFD700" cx="40" cy="40" r="2"/>
  <circle fill="#FFD700" cx="100" cy="30" r="1.5"/>
  <circle fill="#FFD700" cx="180" cy="35" r="2"/>
  <!-- 标题 -->
  <rect fill="rgba(65,105,225,0.85)" x="10" y="175" width="90" height="22" rx="4"/>
  <text x="55" y="190" text-anchor="middle" fill="white" font-size="11" font-family="sans-serif">斋月夜景</text>
</svg>