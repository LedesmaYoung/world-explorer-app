<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 110">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A0E0E"/>
      <stop offset="100%" style="stop-color:#6B1010"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="140" height="110" rx="8"/>
  <!-- 宰牲节装饰 -->
  <circle cx="70" cy="45" r="25" fill="#FFD700" opacity="0.2"/>
  <!-- 星月符号 -->
  <polygon fill="#FFD700" points="70,25 73,35 83,35 75,42 78,52 70,46 62,52 65,42 57,35 67,35"/>
  <circle cx="70" cy="70" r="12" fill="none" stroke="#FFD700" stroke-width="2"/>
  <!-- 装饰线 -->
  <line x1="30" y1="85" x2="110" y2="85" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
  <text x="70" y="100" text-anchor="middle" fill="#FFD700" font-size="10">宰牲节</text>
</svg>