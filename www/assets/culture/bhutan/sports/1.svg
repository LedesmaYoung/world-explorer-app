<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <rect fill="#E8F5E9" width="280" height="200"/>
  <!-- 射箭场 -->
  <rect fill="#228B22" x="30" y="100" width="220" height="80"/>
  <!-- 靶子 -->
  <circle fill="#F5F5DC" cx="230" cy="130" r="30"/>
  <circle fill="#DC143C" cx="230" cy="130" r="20"/>
  <circle fill="#F5F5DC" cx="230" cy="130" r="10"/>
  <circle fill="#DC143C" cx="230" cy="130" r="5"/>
  <!-- 箭 -->
  <line x1="60" y1="130" x2="200" y2="130" stroke="#8B4513" stroke-width="3"/>
  <polygon fill="#FFD700" points="200,130 190,125 190,135"/>
  <!-- 射手 -->
  <ellipse fill="#DEB887" cx="60" cy="110" rx="10" ry="12"/>
  <path fill="#DC143C" d="M50,122 L70,122 L75,170 L45,170 Z"/>
  <!-- 弓 -->
  <path fill="none" stroke="#8B4513" stroke-width="4" d="M40,80 Q60,130 40,180"/>
  <!-- 弓弦 -->
  <line x1="40" y1="80" x2="58" y2="130" stroke="#4169E1" stroke-width="2"/>
  <line x1="40" y1="180" x2="58" y2="130" stroke="#4169E1" stroke-width="2"/>
  <!-- 标题 -->
  <rect fill="rgba(34,139,34,0.85)" x="10" y="10" width="50" height="25" rx="4"/>
  <text x="35" y="27" text-anchor="middle" fill="white" font-size="12" font-family="sans-serif">射箭</text>
</svg>