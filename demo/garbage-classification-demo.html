<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>垃圾分类知识探索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Arial', sans-serif;
      background-color: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    
    h1 {
      text-align: center;
      color: #4CAF50;
      margin-bottom: 30px;
    }
    
    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .btn {
      padding: 12px 24px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background-color: #4CAF50;
      color: white;
    }
    
    .btn-primary:hover {
      background-color: #45a049;
      transform: translateY(-2px);
    }
    
    .btn-secondary {
      background-color: #2196F3;
      color: white;
    }
    
    .btn-secondary:hover {
      background-color: #0b7dda;
      transform: translateY(-2px);
    }
    
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.4);
    }
    
    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .modal-content {
      background-color: white;
      margin: 15% auto;
      padding: 20px;
      border-radius: 10px;
      width: 80%;
      max-width: 600px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid #eee;
    }
    
    .modal-header h2 {
      color: #333;
    }
    
    .close-btn {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }
    
    .close-btn:hover {
      color: #333;
    }
    
    .garbage-types-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    
    .garbage-type-card {
      background: #f9f9f9;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid #eee;
    }
    
    .garbage-type-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .garbage-type-icon {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin: 0 auto 10px;
    }
    
    .garbage-type-name {
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .garbage-type-desc {
      font-size: 14px;
      color: #666;
    }
    
    .garbage-items-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }
    
    .garbage-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px;
      background: #f9f9f9;
      border-radius: 8px;
    }
    
    .garbage-item-icon {
      font-size: 24px;
      margin-bottom: 5px;
    }
    
    .garbage-item-name {
      font-size: 14px;
      text-align: center;
    }
    
    .difficulty-select {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 20px;
    }
    
    .difficulty-option {
      background: #f9f9f9;
      border-radius: 8px;
      padding: 15px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid #eee;
    }
    
    .difficulty-option:hover {
      transform: translateX(5px);
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    
    .difficulty-name {
      font-weight: bold;
      margin-bottom: 5px;
    }
    
    .difficulty-info {
      font-size: 14px;
      color: #666;
    }
    
    .garbage-game-play-area {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 20px;
    }
    
    .garbage-items-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      gap: 10px;
      padding: 15px;
      background: #f9f9f9;
      border-radius: 10px;
    }
    
    .garbage-item {
      cursor: grab;
      transition: all 0.2s ease;
    }
    
    .garbage-item:hover {
      transform: scale(1.05);
    }
    
    .garbage-item.dragging {
      opacity: 0.5;
      transform: scale(1.1);
    }
    
    .garbage-bins {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    
    .garbage-bin {
      border: 2px dashed #ccc;
      border-radius: 10px;
      padding: 20px;
      text-align: center;
      transition: all 0.3s ease;
      min-height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .garbage-bin.hover {
      border-style: solid;
      transform: scale(1.05);
    }
    
    .garbage-bin-icon {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 10px;
    }
    
    .game-stats {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 18px;
      font-weight: bold;
    }
    
    .game-message {
      text-align: center;
      padding: 10px;
      border-radius: 5px;
      margin-top: 20px;
      font-weight: bold;
    }
    
    .game-message.correct {
      background-color: #d4edda;
      color: #155724;
    }
    
    .game-message.error {
      background-color: #f8d7da;
      color: #721c24;
    }
    
    .game-result {
      text-align: center;
      margin-top: 20px;
    }
    
    .result-message {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #4CAF50;
    }
    
    .result-score {
      font-size: 20px;
      margin-bottom: 30px;
    }
    
    .result-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌍 垃圾分类知识探索</h1>
    
    <div class="button-container">
      <button class="btn btn-primary" onclick="GarbageEncyclopedia.showEncyclopedia()">📚 垃圾分类百科</button>
      <button class="btn btn-secondary" onclick="GarbageGame.showDifficultySelect()">🎮 垃圾分类游戏</button>
    </div>
  </div>
  
  <!-- 垃圾分类百科弹窗 -->
  <div id="garbage-encyclopedia-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>垃圾分类百科</h2>
        <button class="close-btn" onclick="GarbageEncyclopedia.closeEncyclopedia()">✕</button>
      </div>
      <div class="garbage-types-grid" id="garbage-types-grid">
        <!-- 动态生成垃圾类型 -->
      </div>
    </div>
  </div>
  
  <!-- 垃圾类型详情弹窗 -->
  <div id="garbage-detail-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="garbage-detail-title">垃圾类型详情</h3>
        <button class="close-btn" onclick="document.getElementById('garbage-detail-modal').classList.remove('active')">✕</button>
      </div>
      <div class="garbage-detail-body" id="garbage-detail-body">
        <!-- 动态生成详情 -->
      </div>
      <button class="btn btn-primary" onclick="document.getElementById('garbage-detail-modal').classList.remove('active')">我知道了 👍</button>
    </div>
  </div>
  
  <!-- 游戏难度选择弹窗 -->
  <div id="garbage-game-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>垃圾分类挑战</h2>
        <button class="close-btn" onclick="document.getElementById('garbage-game-modal').classList.remove('active')">✕</button>
      </div>
      <div class="difficulty-select" id="difficulty-select">
        <!-- 动态生成难度选项 -->
      </div>
    </div>
  </div>
  
  <!-- 游戏播放弹窗 -->
  <div id="garbage-game-play-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="game-title">垃圾分类挑战</h2>
        <div class="game-stats">
          <span class="score">得分: <span id="garbage-score">0</span></span>
          <span class="time">时间: <span id="garbage-time">60</span>秒</span>
        </div>
      </div>
      <div class="garbage-game-play-area">
        <div class="garbage-items-container" id="garbage-items-container">
          <!-- 动态生成垃圾物品 -->
        </div>
        <div class="garbage-bins" id="garbage-bins">
          <!-- 动态生成垃圾桶 -->
        </div>
      </div>
      <div class="game-message" id="game-message"></div>
    </div>
  </div>
  
  <!-- 游戏结果弹窗 -->
  <div id="garbage-game-result-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>游戏结果</h2>
        <button class="close-btn" onclick="document.getElementById('garbage-game-result-modal').classList.remove('active')">✕</button>
      </div>
      <div class="game-result">
        <div class="result-message" id="result-message">🎉 挑战完成！</div>
        <div class="result-score">得分：<span id="result-score">0</span></div>
        <div class="result-buttons">
          <button class="btn btn-primary" onclick="GarbageGame.showDifficultySelect(); document.getElementById('garbage-game-result-modal').classList.remove('active')">再玩一次</button>
          <button class="btn btn-secondary" onclick="document.getElementById('garbage-game-result-modal').classList.remove('active')">返回</button>
        </div>
      </div>
    </div>
  </div>
  
  <!-- 垃圾分类数据 -->
  <script>
    // 垃圾类型定义
    const GARBAGE_TYPES = {
      RECYCLABLE: 'recyclable',      // 可回收物
      HAZARDOUS: 'hazardous',        // 有害垃圾
      KITCHEN: 'kitchen',            // 厨余垃圾
      OTHER: 'other'                 // 其他垃圾
    };

    // 垃圾类型信息
    const GARBAGE_TYPE_INFO = {
      [GARBAGE_TYPES.RECYCLABLE]: {
        name: '可回收物',
        color: '#4B9CD3',
        desc: '可回收物是指适宜回收循环使用和资源利用的废物',
        examples: ['纸类', '塑料', '玻璃', '金属', '织物'],
        icon: '♻️'
      },
      [GARBAGE_TYPES.HAZARDOUS]: {
        name: '有害垃圾',
        color: '#F94343',
        desc: '有害垃圾是指含有对人体健康有害的重金属、有毒的物质或者对环境造成现实危害或者潜在危害的废弃物',
        examples: ['电池', '灯管', '药品', '油漆及其容器'],
        icon: '⚠️'
      },
      [GARBAGE_TYPES.KITCHEN]: {
        name: '厨余垃圾',
        color: '#52C41A',
        desc: '厨余垃圾是指居民日常生活及食品加工、饮食服务、单位供餐等活动中产生的垃圾',
        examples: ['剩菜剩饭', '果皮', '蛋壳', '骨头', '菜叶'],
        icon: '🍎'
      },
      [GARBAGE_TYPES.OTHER]: {
        name: '其他垃圾',
        color: '#9E9E9E',
        desc: '其他垃圾是指危害较小，但无再次利用价值的垃圾',
        examples: ['烟头', '一次性餐具', '污损纸张', '砖瓦陶瓷'],
        icon: '🗑️'
      }
    };

    // 游戏物品数据
    const GARBAGE_ITEMS = [
      // 可回收物
      { id: 'paper', name: '废纸', type: GARBAGE_TYPES.RECYCLABLE, icon: '📄' },
      { id: 'plastic-bottle', name: '塑料瓶', type: GARBAGE_TYPES.RECYCLABLE, icon: '🥤' },
      { id: 'glass', name: '玻璃瓶', type: GARBAGE_TYPES.RECYCLABLE, icon: '🍾' },
      { id: 'can', name: '易拉罐', type: GARBAGE_TYPES.RECYCLABLE, icon: '🥫' },
      { id: 'cardboard', name: '纸箱', type: GARBAGE_TYPES.RECYCLABLE, icon: '📦' },
      { id: 'textile', name: '旧衣服', type: GARBAGE_TYPES.RECYCLABLE, icon: '👕' },
      
      // 有害垃圾
      { id: 'battery', name: '电池', type: GARBAGE_TYPES.HAZARDOUS, icon: '🔋' },
      { id: 'light-bulb', name: '灯泡', type: GARBAGE_TYPES.HAZARDOUS, icon: '💡' },
      { id: 'medicine', name: '药品', type: GARBAGE_TYPES.HAZARDOUS, icon: '💊' },
      { id: 'paint', name: '油漆', type: GARBAGE_TYPES.HAZARDOUS, icon: '🎨' },
      { id: 'thermometer', name: '体温计', type: GARBAGE_TYPES.HAZARDOUS, icon: '🌡️' },
      
      // 厨余垃圾
      { id: 'apple-core', name: '苹果核', type: GARBAGE_TYPES.KITCHEN, icon: '🍎' },
      { id: 'leftovers', name: '剩菜', type: GARBAGE_TYPES.KITCHEN, icon: '🍱' },
      { id: 'egg-shell', name: '蛋壳', type: GARBAGE_TYPES.KITCHEN, icon: '🥚' },
      { id: 'bone', name: '骨头', type: GARBAGE_TYPES.KITCHEN, icon: '🍖' },
      { id: 'vegetable', name: '蔬菜', type: GARBAGE_TYPES.KITCHEN, icon: '🥬' },
      
      // 其他垃圾
      { id: 'cigarette', name: '烟头', type: GARBAGE_TYPES.OTHER, icon: '🚬' },
      { id: 'tissue', name: '纸巾', type: GARBAGE_TYPES.OTHER, icon: '🧻' },
      { id: 'diaper', name: '尿布', type: GARBAGE_TYPES.OTHER, icon: '👶' },
      { id: 'ceramic', name: '陶瓷', type: GARBAGE_TYPES.OTHER, icon: '🍶' },
      { id: 'plastic-bag', name: '塑料袋', type: GARBAGE_TYPES.OTHER, icon: '🛍️' }
    ];

    // 游戏难度配置
    const GARBAGE_GAME_LEVELS = {
      easy: {
        name: '简单',
        itemCount: 6,
        timeLimit: 60,
        scorePerItem: 10
      },
      medium: {
        name: '中等',
        itemCount: 10,
        timeLimit: 90,
        scorePerItem: 15
      },
      hard: {
        name: '困难',
        itemCount: 14,
        timeLimit: 120,
        scorePerItem: 20
      }
    };
  </script>
  
  <!-- 垃圾分类百科功能 -->
  <script>
    class GarbageEncyclopedia {
      static showEncyclopedia() {
        const modal = document.getElementById('garbage-encyclopedia-modal');
        const grid = document.getElementById('garbage-types-grid');
        
        // 渲染垃圾类型列表
        grid.innerHTML = Object.entries(GARBAGE_TYPE_INFO).map(([type, info]) => `
          <div class="garbage-type-card" data-type="${type}" onclick="GarbageEncyclopedia.showGarbageTypeDetail('${type}')">
            <div class="garbage-type-icon" style="background-color: ${info.color}">
              ${info.icon}
            </div>
            <div class="garbage-type-name">${info.name}</div>
            <div class="garbage-type-desc">${info.desc}</div>
          </div>
        `).join('');
        
        modal.classList.add('active');
      }

      static showGarbageTypeDetail(type) {
        const info = GARBAGE_TYPE_INFO[type];
        if (!info) return;

        const modal = document.getElementById('garbage-detail-modal');
        const title = document.getElementById('garbage-detail-title');
        const body = document.getElementById('garbage-detail-body');
        
        // 过滤该类型的垃圾物品
        const items = GARBAGE_ITEMS.filter(item => item.type === type);

        // 渲染详情
        title.textContent = info.name;
        body.innerHTML = `
          <div class="garbage-detail-desc">${info.desc}</div>
          <div class="garbage-detail-examples">
            <h4>常见物品：</h4>
            <div class="garbage-items-list">
              ${items.map(item => `
                <div class="garbage-item">
                  <span class="garbage-item-icon">${item.icon}</span>
                  <span class="garbage-item-name">${item.name}</span>
                </div>
              `).join('')}
            </div>
          </div>
        `;
        
        modal.classList.add('active');
      }

      static closeEncyclopedia() {
        const modal = document.getElementById('garbage-encyclopedia-modal');
        modal.classList.remove('active');
      }
    }
  </script>
  
  <!-- 垃圾分类游戏功能 -->
  <script>
    class GarbageGame {
      static showDifficultySelect() {
        const modal = document.getElementById('garbage-game-modal');
        const select = document.getElementById('difficulty-select');
        
        select.innerHTML = Object.entries(GARBAGE_GAME_LEVELS).map(([level, config]) => `
          <div class="difficulty-option" onclick="GarbageGame.start('${level}')">
            <div class="difficulty-name">${config.name}</div>
            <div class="difficulty-info">
              <span>物品数量: ${config.itemCount}</span><br>
              <span>时间限制: ${config.timeLimit}秒</span><br>
              <span>每题得分: ${config.scorePerItem}</span>
            </div>
          </div>
        `).join('');
        
        modal.classList.add('active');
      }

      static start(level) {
        const config = GARBAGE_GAME_LEVELS[level];
        if (!config) return;

        // 关闭难度选择弹窗
        document.getElementById('garbage-game-modal').classList.remove('active');

        // 打开游戏弹窗
        const playModal = document.getElementById('garbage-game-play-modal');
        const gameTitle = document.getElementById('game-title');
        const itemsContainer = document.getElementById('garbage-items-container');
        const binsContainer = document.getElementById('garbage-bins');
        
        gameTitle.textContent = `垃圾分类挑战 - ${config.name}`;
        
        // 生成游戏物品
        const items = this.generateGameItems(config.itemCount);
        
        // 渲染物品
        itemsContainer.innerHTML = items.map(item => `
          <div class="garbage-item" draggable="true" data-type="${item.type}" data-id="${item.id}">
            <span class="garbage-item-icon">${item.icon}</span>
            <span class="garbage-item-name">${item.name}</span>
          </div>
        `).join('');
        
        // 渲染垃圾桶
        binsContainer.innerHTML = Object.entries(GARBAGE_TYPE_INFO).map(([type, info]) => `
          <div class="garbage-bin" data-type="${type}" style="border-color: ${info.color}">
            <div class="garbage-bin-icon" style="background-color: ${info.color}">
              ${info.icon}
            </div>
            <div class="garbage-bin-name">${info.name}</div>
          </div>
        `).join('');
        
        // 绑定拖拽事件
        this.bindDragEvents();
        
        // 开始游戏
        this.startGame(config, items);
        
        playModal.classList.add('active');
      }

      static generateGameItems(count) {
        const shuffled = [...GARBAGE_ITEMS].sort(() => 0.5 - Math.random());
        return shuffled.slice(0, count);
      }

      static bindDragEvents() {
        const items = document.querySelectorAll('.garbage-item');
        const bins = document.querySelectorAll('.garbage-bin');

        items.forEach(item => {
          item.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', item.dataset.type);
            item.classList.add('dragging');
          });

          item.addEventListener('dragend', () => {
            item.classList.remove('dragging');
          });
        });

        bins.forEach(bin => {
          bin.addEventListener('dragover', (e) => {
            e.preventDefault();
            bin.classList.add('hover');
          });

          bin.addEventListener('dragleave', () => {
            bin.classList.remove('hover');
          });

          bin.addEventListener('drop', (e) => {
            e.preventDefault();
            bin.classList.remove('hover');
            
            const itemType = e.dataTransfer.getData('text/plain');
            const binType = bin.dataset.type;
            
            this.checkAnswer(itemType, binType);
          });
        });
      }

      static startGame(config, items) {
        let score = 0;
        let timeLeft = config.timeLimit;
        let itemsLeft = items.length;
        
        const scoreElement = document.getElementById('garbage-score');
        const timeElement = document.getElementById('garbage-time');
        const messageElement = document.getElementById('game-message');

        // 倒计时
        const timer = setInterval(() => {
          timeLeft--;
          timeElement.textContent = timeLeft;
          
          if (timeLeft <= 0) {
            clearInterval(timer);
            this.endGame(score, false);
          }
        }, 1000);

        // 保存游戏状态
        this.gameState = {
          config,
          score,
          timeLeft,
          itemsLeft,
          timer,
          scoreElement,
          timeElement,
          messageElement
        };
      }

      static checkAnswer(itemType, binType) {
        const isCorrect = itemType === binType;
        const messageElement = this.gameState.messageElement;
        
        if (isCorrect) {
          // 正确
          this.gameState.score += this.gameState.config.scorePerItem;
          this.gameState.scoreElement.textContent = this.gameState.score;
          this.gameState.itemsLeft--;
          
          messageElement.textContent = '✅ 分类正确！';
          messageElement.className = 'game-message correct';
          
          // 检查是否完成游戏
          if (this.gameState.itemsLeft === 0) {
            clearInterval(this.gameState.timer);
            this.endGame(this.gameState.score, true);
          }
        } else {
          // 错误
          messageElement.textContent = '❌ 分类错误，再试一次！';
          messageElement.className = 'game-message error';
        }
        
        // 3秒后清除消息
        setTimeout(() => {
          messageElement.textContent = '';
          messageElement.className = 'game-message';
        }, 3000);
      }

      static endGame(score, isComplete) {
        // 关闭游戏弹窗
        document.getElementById('garbage-game-play-modal').classList.remove('active');
        
        // 打开结果弹窗
        const resultModal = document.getElementById('garbage-game-result-modal');
        const resultMessage = document.getElementById('result-message');
        const resultScore = document.getElementById('result-score');
        
        resultMessage.textContent = isComplete ? '🎉 挑战完成！' : '⏰ 时间到！';
        resultScore.textContent = score;
        
        resultModal.classList.add('active');
      }
    }
  </script>
</body>
</html>
