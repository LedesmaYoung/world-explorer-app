<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>垃圾分类百科 - 世界环球旅行家</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/games.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    
    .encyclopedia-page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
    
    .page-header {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .page-header h1 {
      margin: 0 0 10px 0;
      color: #333;
      font-size: 28px;
    }
    
    .page-header p {
      margin: 0;
      color: #666;
      font-size: 16px;
    }
    
    .back-btn {
      display: inline-block;
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border-radius: 5px;
      text-decoration: none;
      margin-bottom: 20px;
      transition: background 0.3s ease;
    }
    
    .back-btn:hover {
      background: #45a049;
    }
    
    .types-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .type-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .type-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
    }
    
    .type-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 15px;
    }
    
    .type-name {
      font-size: 24px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 10px;
      color: #333;
    }
    
    .type-desc {
      font-size: 14px;
      color: #666;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 15px;
    }
    
    .type-examples {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    
    .example-tag {
      padding: 5px 12px;
      background: #f0f0f0;
      border-radius: 15px;
      font-size: 12px;
      color: #666;
    }
    
    .items-section {
      background: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .section-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #333;
    }
    
    .items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 15px;
    }
    
    .item-card {
      background: #f9f9f9;
      border-radius: 10px;
      padding: 15px;
      text-align: center;
      transition: all 0.3s ease;
    }
    
    .item-card:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    
    .item-image {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
    }
    
    .item-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }
    
    .item-name {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #333;
    }
    
    .item-desc {
      font-size: 12px;
      color: #666;
      line-height: 1.4;
    }
    
    .filter-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .filter-tab {
      padding: 10px 20px;
      background: #f0f0f0;
      border: none;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .filter-tab.active {
      background: #4CAF50;
      color: white;
    }
    
    .filter-tab:hover {
      background: #e0e0e0;
    }
    
    .filter-tab.active:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div class="encyclopedia-page">
    <a href="../index.html" class="back-btn">← 返回首页</a>
    
    <div class="page-header">
      <h1>📚 垃圾分类百科</h1>
      <p>了解垃圾分类知识，共建美好家园</p>
    </div>
    
    <div class="types-grid" id="types-grid">
      <!-- 垃圾类型卡片将在这里动态生成 -->
    </div>
    
    <div class="items-section">
      <h2 class="section-title">垃圾物品列表</h2>
      
      <div class="filter-tabs">
        <button class="filter-tab active" data-type="all">全部</button>
        <button class="filter-tab" data-type="hazardous">有害垃圾</button>
        <button class="filter-tab" data-type="kitchen">厨余垃圾</button>
        <button class="filter-tab" data-type="recyclable">可回收物</button>
        <button class="filter-tab" data-type="other">其他垃圾</button>
      </div>
      
      <div class="items-grid" id="items-grid">
        <!-- 垃圾物品卡片将在这里动态生成 -->
      </div>
    </div>
  </div>
  
  <script src="../js/garbage-data.js"></script>
  <script>
    // 加载垃圾分类数据
    let garbageData = null;
    
    async function loadGarbageData() {
      try {
        const response = await fetch('../data/garbage/garbage-data.json');
        garbageData = await response.json();
        renderTypes();
        renderItems('all');
        setupFilterTabs();
      } catch (error) {
        console.error('加载垃圾分类数据失败:', error);
      }
    }
    
    function renderTypes() {
      const typesGrid = document.getElementById('types-grid');
      typesGrid.innerHTML = '';
      
      for (const [type, info] of Object.entries(garbageData.types)) {
        const card = document.createElement('div');
        card.className = 'type-card';
        card.onclick = () => filterItems(type);
        
        card.innerHTML = `
          <div class="type-icon" style="background-color: ${info.color}">
            ${info.icon}
          </div>
          <div class="type-name">${info.name}</div>
          <div class="type-desc">${info.desc}</div>
          <div class="type-examples">
            ${info.examples.slice(0, 5).map(example => 
              `<span class="example-tag">${example}</span>`
            ).join('')}
          </div>
        `;
        
        typesGrid.appendChild(card);
      }
    }
    
    function renderItems(filterType = 'all') {
      const itemsGrid = document.getElementById('items-grid');
      itemsGrid.innerHTML = '';
      
      let items = garbageData.items;
      if (filterType !== 'all') {
        items = items.filter(item => item.type === filterType);
      }
      
      for (const item of items) {
        const card = document.createElement('div');
        card.className = 'item-card';
        
        card.innerHTML = `
          ${item.image ? 
            `<img class="item-image" src="../${item.image}" alt="${item.name}" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
             <div class="item-icon" style="display: none;">${item.icon}</div>` :
            `<div class="item-icon">${item.icon}</div>`
          }
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
        `;
        
        itemsGrid.appendChild(card);
      }
    }
    
    function filterItems(type) {
      // 更新标签页状态
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.classList.remove('active');
        if (tab.dataset.type === type) {
          tab.classList.add('active');
        }
      });
      
      // 渲染物品
      renderItems(type);
    }
    
    function setupFilterTabs() {
      document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          filterItems(tab.dataset.type);
        });
      });
    }
    
    // 页面加载时初始化
    loadGarbageData();
  </script>
</body>
</html>
